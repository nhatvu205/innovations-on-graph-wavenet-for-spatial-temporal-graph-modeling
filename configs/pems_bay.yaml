# PEMS-BAY experiment configuration
device: "cuda:0"
data: "data/PEMS-BAY"
adjdata: "data/sensor_graph/adj_mx_bay.pkl"
adjtype: "doubletransition"

# Model
gcn_bool: true
addaptadj: true
randomadj: true
aptonly: false
seq_length: 12
nhid: 32
in_dim: 2
num_nodes: 325

# Training
batch_size: 64
learning_rate: 0.001
dropout: 0.3
weight_decay: 0.0001
epochs: 100
print_every: 50

# Checkpointing
save: "garage/bay"
expid: 1
